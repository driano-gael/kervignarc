# Configuration Alembic (E00US006) — migrations du schéma SQLite.
#
# L'URL de la base est résolue dynamiquement dans `migrations/env.py`
# (variable d'environnement KERVIGNARC_DATABASE_URL, sinon défaut local) —
# jamais codée en dur ici, pour rester cohérente avec la composition root.
#
# Usage (depuis backend/, environnement installé) :
#   alembic upgrade head          # applique les migrations
#   alembic revision -m "..."     # crée une révision (autogénération à venir en E00US009)

[alembic]
script_location = migrations
prepend_sys_path = .
# Séparateur des chemins (prepend_sys_path) : `os` = os.pathsep (recommandé, Alembic ≥ 1.18).
path_separator = os
# sqlalchemy.url : intentionnellement absent — fourni par migrations/env.py.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
