# Hooks pre-commit (E00US002) — qualité bloquante avant chaque commit.
# cf. guide-architecture.md §5. Installation : `pre-commit install` (depuis la racine).
#
# - Backend : ruff (lint+format) et mypy strict tournent dans des environnements
#   auto-gérés par pre-commit (dépendances épinglées ci-dessous, self-contained).
# - Frontend : eslint et prettier utilisent les node_modules du projet (npx --no-install) ;
#   exécuter `npm install` dans frontend/ au préalable.
default_language_version:
  python: python3.13

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint) — backend
        entry: ruff check --fix
        language: python
        additional_dependencies: ["ruff==0.8.6"]
        types_or: [python, pyi]
        files: ^backend/

      - id: ruff-format
        name: ruff (format) — backend
        entry: ruff format
        language: python
        additional_dependencies: ["ruff==0.8.6"]
        types_or: [python, pyi]
        files: ^backend/

      - id: mypy
        name: mypy (strict) — backend
        entry: mypy --strict --config-file=backend/pyproject.toml backend
        language: python
        additional_dependencies:
          - "mypy==1.14.1"
          - "fastapi==0.139.0"
          - "uvicorn==0.51.0"
          - "httpx==0.28.1"
          - "pytest==9.1.1"
          - "sqlalchemy==2.0.51"
          - "alembic==1.18.5"
        pass_filenames: false
        files: ^backend/.*\.py$

      - id: domain-isolation
        name: garde-fou imports domaine (hexagonal) — backend
        entry: pytest backend/tests/test_domain_isolation.py -q
        language: python
        additional_dependencies: ["pytest==9.1.1"]
        pass_filenames: false
        # `tests/conftest` est dans la liste : ce hook s'exécute avec **pytest pour seule
        # dépendance**, et pytest charge le conftest avant tout test. Un import de framework
        # ajouté là casserait le garde-fou sans que la CI (environnement complet) ne le voie.
        files: ^backend/(domain/.*|tests/(test_domain_isolation|conftest))\.py$

      - id: eslint
        name: eslint — frontend
        entry: bash -c 'cd frontend && npx --no-install eslint .'
        language: system
        files: ^frontend/.*\.(ts|tsx|js)$
        pass_filenames: false

      - id: prettier
        name: prettier (check) — frontend
        entry: bash -c 'cd frontend && npx --no-install prettier --check .'
        language: system
        files: ^frontend/
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
